version: 2.1

docker: &DOCKER_NODE
  docker:
    - image: cimg/node:lts

slack_context: &SLACK_NOTIFICATION_CONTEXT
  context:
    - FE Slack notifications

slack_notify: &SLACK_NOTIFY
  slack/notify:
    event: fail
    template: basic_fail_1
    branch_pattern: main

orbs:
  slack: circleci/slack@6.1.3

jobs:
  install:
    <<: *DOCKER_NODE
    resource_class: small
    steps:
      - checkout
      - restore_cache:
          key: v1-npm-{{ checksum "package-lock.json" }}
      - run: npm ci --ignore-scripts=false
      - run: npm ls
      - save_cache:
          key: v1-npm-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: ~/
          paths:
            - project
      - <<: *SLACK_NOTIFY

  unit:
    <<: *DOCKER_NODE
    resource_class: small
    steps:
      - attach_workspace:
          at: ~/
      - run:
          command: npm run test -- --runInBand
          no_output_timeout: 3m
      - <<: *SLACK_NOTIFY

  lint:
    <<: *DOCKER_NODE
    resource_class: small
    steps:
      - attach_workspace:
          at: ~/
      - run: npm run lint
      - <<: *SLACK_NOTIFY

workflows:
  test:
    jobs:
      - install:
          <<: *SLACK_NOTIFICATION_CONTEXT
      - unit:
          <<: *SLACK_NOTIFICATION_CONTEXT
          requires:
            - install
      - lint:
          <<: *SLACK_NOTIFICATION_CONTEXT
          requires:
            - install
